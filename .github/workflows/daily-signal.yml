name: ATR趋势 有操作才发

on:
  schedule:
    # 每天北京时间 08:00
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  signal:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run strategy
        env:
          TZ: Asia/Shanghai
          CRYPTO_EMAIL_FROM: ${{ secrets.CRYPTO_EMAIL_FROM }}
          CRYPTO_EMAIL_TO: ${{ secrets.CRYPTO_EMAIL_TO }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
        run: |
          cd scripts
          python alert.py
