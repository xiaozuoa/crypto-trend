name: ATR趋势 每日信号

on:
  schedule:
    # 每天北京时间 08:00 (UTC 00:00)
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  signal:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run strategy
        env:
          TZ: Asia/Shanghai
          CRYPTO_EMAIL_FROM: ${{ secrets.CRYPTO_EMAIL_FROM }}
          CRYPTO_EMAIL_TO: ${{ secrets.CRYPTO_EMAIL_TO }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
        run: |
          cd scripts
          python -c "
          from alert import run, send_email
          results = run()
          for name, r in results.items():
              if r.get('signal') == 1:
                  print(f'{name}: BUY at {r[\"entry_price\"]}')
              elif r.get('exit'):
                  print(f'{name}: SELL {r[\"profit_pct\"]:+.2f}%')
              elif r.get('action') == 'wait':
                  print(f'{name}: WAIT (need {r[\"buy_trigger\"]:.1f})')
              else:
                  print(f'{name}: HOLD')
          send_email(results)
          "
